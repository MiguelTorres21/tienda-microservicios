version: "3.9"

networks:
  tienda-net:
    driver: bridge

volumes:
  products-db-data:
  inventory-db-data:

services:

  products-db:
    image: postgres:16-alpine
    container_name: products-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PRODUCTS_DB_NAME:-products_db}
      POSTGRES_USER: ${PRODUCTS_DB_USER:-products_user}
      POSTGRES_PASSWORD: ${PRODUCTS_DB_PASSWORD:-products_pass}
    ports:
      - "${PRODUCTS_DB_PORT:-5432}:5432"
    volumes:
      - products-db-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${PRODUCTS_DB_USER:-products_user} -d ${PRODUCTS_DB_NAME:-products_db}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tienda-net

  inventory-db:
    image: postgres:16-alpine
    container_name: inventory-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${INVENTORY_DB_NAME:-inventory_db}
      POSTGRES_USER: ${INVENTORY_DB_USER:-inventory_user}
      POSTGRES_PASSWORD: ${INVENTORY_DB_PASSWORD:-inventory_pass}
    ports:
      - "${INVENTORY_DB_PORT:-5433}:5432"
    volumes:
      - inventory-db-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${INVENTORY_DB_USER:-inventory_user} -d ${INVENTORY_DB_NAME:-inventory_db}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tienda-net

  products-service:
    build:
      context: ../products-service
      dockerfile: Dockerfile
    container_name: products-service
    restart: unless-stopped
    depends_on:
      products-db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILE:-dev}
      DB_URL: jdbc:postgresql://products-db:5432/${PRODUCTS_DB_NAME:-products_db}
      DB_USER: ${PRODUCTS_DB_USER:-products_user}
      DB_PASSWORD: ${PRODUCTS_DB_PASSWORD:-products_pass}
      JWT_SECRET: ${JWT_SECRET:-cambiar-este-secreto-en-produccion-min-32-chars}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-3600000}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-dev-internal-key-cambiar-en-produccion}
    ports:
      - "${PRODUCTS_SERVICE_PORT:-8081}:8081"
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8081/actuator/health/liveness || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - tienda-net

  inventory-service:
    build:
      context: ../inventory-service
      dockerfile: Dockerfile
    container_name: inventory-service
    restart: unless-stopped
    depends_on:
      inventory-db:
        condition: service_healthy
      products-service:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILE:-dev}
      DB_URL: jdbc:postgresql://inventory-db:5432/${INVENTORY_DB_NAME:-inventory_db}
      DB_USER: ${INVENTORY_DB_USER:-inventory_user}
      DB_PASSWORD: ${INVENTORY_DB_PASSWORD:-inventory_pass}
      JWT_SECRET: ${JWT_SECRET:-cambiar-este-secreto-en-produccion-min-32-chars}
      PRODUCTS_SERVICE_URL: http://products-service:8081
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-dev-internal-key-cambiar-en-produccion}
      IDEMPOTENCY_TTL_HOURS: ${IDEMPOTENCY_TTL_HOURS:-24}
    ports:
      - "${INVENTORY_SERVICE_PORT:-8082}:8082"
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8082/actuator/health/liveness || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - tienda-net
