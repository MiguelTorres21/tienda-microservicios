server:
  port: 8081

spring:
  application:
    name: products-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/products_db}
    username: ${DB_USER:products_user}
    password: ${DB_PASSWORD:products_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

security:
  jwt:
    secret: ${JWT_SECRET:cambiar-este-secreto-en-produccion-min-32-chars}
    expiration-ms: ${JWT_EXPIRATION_MS:3600000}

internal:
  api-key: ${INTERNAL_API_KEY:dev-internal-key-cambiar-en-produccion}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState,db
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

rate-limit:
  capacity: ${RATE_LIMIT_CAPACITY:50}
  refill-per-minute: ${RATE_LIMIT_REFILL:50}

logging:
  level:
    com.tienda.products: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: '{"timestamp":"%d{yyyy-MM-dd HH:mm:ss.SSS}","level":"%p","service":"products-service","correlationId":"%X{correlationId}","logger":"%logger{36}","message":"%msg"}%n'

---
spring:
  config:
    activate:
      on-profile: dev
  flyway:
    locations: classpath:db/migration

logging:
  level:
    com.tienda.products: DEBUG
    org.hibernate.SQL: DEBUG

---
spring:
  config:
    activate:
      on-profile: test
  flyway:
    locations: classpath:db/migration
  jpa:
    show-sql: true

logging:
  level:
    com.tienda.products: DEBUG
